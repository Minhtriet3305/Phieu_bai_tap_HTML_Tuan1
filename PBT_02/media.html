<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
</head>
<body>
    <figure>
        <img src="https://placehold.co/300x200" alt="Mô tả hình ảnh 1">
        <figcaption>Ảnh 1</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200" alt="Mô tả hình ảnh 2">
        <figcaption>Ảnh 2</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200" alt="Mô tả hình ảnh 3">
        <figcaption>Ảnh 3</figcaption>
    </figure>

    <iframe width="700" height="400" src="https://www.youtube.com/embed/CgEapa6X7us" title="Đánh giá iPhone 16 Pro" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
    <br><br>
    
    <video controls
       width="640"
       height="360"
       poster="../PBT_01/images/OIP.jpg"
       preload="metadata">
    <source src="review.webm" type="video/webm">   
    <source src="review.mp4" type="video/mp4">    
    <p>Browser không hỗ trợ HTML5 video.</p>
    </video>

    <br><br>

    <audio controls >
        <source src="audio.mp3" type="audio/mpeg">
        <p>Browser không hỗ trợ HTML5 audio.</p>
    </audio>

    <br><br>

    <img src="https://placehold.co/300x200" style="max-width: 100%; height: auto;">

    <br><br>

    <svg width="100" height="100" viewBox="0 0 100 100">
        <rect x="10" y="10" width="80" height="80" stroke="black" stroke-width="3" fill="white" />
    </svg>
    
</body>


</html>
